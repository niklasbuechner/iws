<!DOCTYPE html>
<html>

<head>
    <title>Animate SVG</title>
    <link rel="stylesheet" href="./style/animations.css" />
    <script src="./js/animation.js"></script>
    <script>
        window.onload = () => {
            setupAnimationInElement('animation');
            document.getElementById('startButton').addEventListener('click', () => toggleAnimation());
        }
    </script>
</head>
<body>
    <button id="startButton">
        Start
    </button>

    <div id="animation" style="width: 50%"></div>
</body>
</html>
