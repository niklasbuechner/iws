<!DOCTYPE html>
<html>
    <head>
        <title>Aufgabe 1</title>
        <link rel="stylesheet" href="./style/style.css" />
        <link rel="stylesheet" href="./style/animations.css" />
    </head>
    <script>
        let tests = [{
            type: 'letter',
            country: 'Deutschland',
            plz: '68477',
            expectedAccount: '12'
        }, {
            type: 'parcel',
            country: 'Deutschland',
            plz: '96584',
            expectedAccount: '13'
        }, {
            type: 'letter',
            country: 'Deutschland',
            plz: '03753',
            expectedAccount: '14'
        }];

        function getAccount(test) {
            return test.expectedAccount == 14? 10 : test.expectedAccount;
        }
    </script>
    <body>
        <div class="header">
            <div class="content">Aufgabe 1</div>
        </div>
        <div class="content">
            <h1>Aufgabe</h1>
            <p>Hier sollst du folgendes machen:</p>
            <h1>Visualisierung</h1>
            <div id="animation"></div>
            <h1>Tests</h1>
            <div style="text-align: right;">
                <button id="runTests">
                    Testen
                </button>
            </div>
            <div id="tests"></div>
        </div>
        <script src="./js/tests.js"></script>
        <script src="./js/animation.js"></script>
        <script>
            window.addEventListener('load', () => {
                setupAnimationInElement('animation');
                renderTests(tests);
                document.getElementById('runTests').addEventListener('click', () => runTests(tests, getAccount))
            })
        </script>
    </body>
</html>
