<!DOCTYPE html>
<html>
    <head>
        <script type="text/javascript">
            class Line {
                constructor(content, number) {
                    this.content = content;
                    this.number = number;
                }
                renderLineNumber() {
                    return `${this.number}:`;
                }
                test() {
                    return false;
                }
            }
            class EmptyLine extends Line {
                constructor(line) {
                    super("", line);
                }
                render() {
                    return this.renderLineNumber()
                }
            }
            class FaultyLine extends Line {
                constructor(content, line, error) {
                    super(content, line);
                    this.error = error;
                }
                render() {
                    return `
                    ${this.renderLineNumber()} ${this.content}<br />
                    <span style="color: red;">&uarr; ${this.error}</span>`
                }
            }
            class Rule extends Line {
                constructor(content, line, conditions, account) {
                    super(content, line);
                    this.conditions = conditions;
                    this.account = account;
                }
                render(humanFriendly) {
                    const conditions = this.conditions
                        .map(condition => condition.render(humanFriendly))
                        .join('<span style="color:red;">, </span>')

                    return `
                        ${this.renderLineNumber()}
                        <span style="color:green;">${conditions}</span>
                        <span style="color:red;">-></span>
                        <span style="color:blue;">${this.account}</span>
                    `;
                }
                test(element) {
                    for (let condition of this.conditions) {
                        if (!condition.matches(element)) {
                            return false;
                        }
                    }

                    return true;
                }
            }

            function parse() {
                let lineNumber = 0;
                const dsl = document.getElementById('input').value;

                const rules = dsl
                    .split("\n")
                    .map(line => ({
                        number: lineNumber++,
                        content: line.trim(),
                    }))
                    .map(line => {
                        if (line.content === "") {
                            return new EmptyLine(line.number);
                        }

                        const sides = line.content.split("->")
                        if (sides.length !== 2) {
                            return new FaultyLine(line.content, line.number, 'Zeile konnte nicht geparst werden')
                        }

                        return new Rule(line.content, line.number, getConditions(sides[0]), sides[1].trim())
                    });

                const html = rules.map(line => line.render()).join('<br />');
                document.getElementById('output').innerHTML = html;

                const htmlHumanFriendly = rules.map(line => line.render(true)).join('<br />');
                document.getElementById('output-human-friendly').innerHTML = htmlHumanFriendly;

                return rules;
            }

            function getConditions(content) {
                if (content.includes(',')) {
                    return content
                        .split(',')
                        .map(condition => condition.trim())
                        .filter(condition => condition !== "")
                        .map(condition => createCondition(condition))
                }

                return [createCondition(content)]
            }

            class LetterCondition {
                render(humanFriendly) {
                    if (humanFriendly) {
                        return `ist ein Brief`;
                    } else {
                        return `Brief`
                    }
                }
                matches(element) {
                    return element.type === 'letter';
                }
            }
            class ParcelCondition {
                render(humanFriendly) {
                    if (humanFriendly) {
                        return `ist ein Paket`;
                    } else {
                        return `Paket`
                    }
                }
                matches(element) {
                    return element.type === 'parcel';
                }
            }
            class CatchAllCondition {
                render(humanFriendly) {
                    if (humanFriendly) {
                        return `Alles`;
                    } else {
                        return `*`
                    }
                }
                matches(element) {
                    return true;
                }
            }
            class PlzCondition {
                constructor(plzStartsWith) {
                    this.plzStartsWith = plzStartsWith;
                }
                render(humanFriendly) {
                    if (humanFriendly) {
                        return `PLZ beginnt mit ${this.plzStartsWith}`;
                    } else {
                        return `${this.plzStartsWith}*`;
                    }
                }
                matches(element) {
                    return element.plz.startsWith(this.plzStartsWith);
                }
            }
            class CountryCondition {
                constructor(country) {
                    this.country = country;
                }
                render(humanFriendly) {
                    if (humanFriendly) {
                        return `Land ${this.country}`;
                    } else {
                        return this.country;
                    }
                }
                matches(element) {
                    return element.country.toLowerCase() === this.country.toLowerCase();
                }
            }
            class ErrorCondition {
                constructor(error) {
                    this.error = error;
                }
                render(humanFriendly) {
                    return `<span style="color: red;">Attribute ${this.error} existiert nicht.</span>`;
                }
                matches(element) {
                    return false;
                }
            }

            function createCondition(condition) {
                condition = condition.trim()
                
                if (condition.toLowerCase() === "brief") {
                    return new LetterCondition()
                } else if (condition.toLowerCase() === "paket") {
                    return new ParcelCondition()
                } else if (/[\d]+\*/.test(condition)) {
                    return new PlzCondition(condition.replaceAll('*', ''));
                } else if (/^[a-zA-ZäöüÄÜÖ]+$/.test(condition)) {
                    return new CountryCondition(condition);
                } else if (condition === "*") {
                    return new CatchAllCondition();
                } else {
                    return new ErrorCondition(condition);
                }
            }

            function run() {
                const rules = parse();
                console.log(rules);

                runTests(rules);
            }

            function runTests(rules) {
                const tests = [{
                    type: 'letter',
                    country: 'Deutschland',
                    plz: '68477',
                    expectedAccount: '12'
                }, {
                    type: 'parcel',
                    country: 'Deutschland',
                    plz: '96584',
                    expectedAccount: '13'
                }, {
                    type: 'letter',
                    country: 'Deutschland',
                    plz: '03753',
                    expectedAccount: '14'
                }, {
                    type: 'letter',
                    country: 'Österreich',
                    plz: '03753',
                    expectedAccount: '10'
                }, {
                    type: 'parcel',
                    country: 'Deutschland',
                    plz: '68477',
                    expectedAccount: '11'
                }, {
                    type: 'parcel',
                    country: 'Schweden',
                    plz: '68477',
                    expectedAccount: '19'
                }];

                const html = tests.map(test => runTest(rules, test)).join('');
                document.getElementById('tests').innerHTML = html;
            }

            function runTest(rules, test) {
                const testDescription = `
                    <div class="test-result">
                    🕵️‍♀️ Test
                    Land ${test.country},
                    PLZ: ${test.plz},
                    Type: ${test.type === 'letter' ? 'Brief' : 'Paket'},
                    Erwarteter Account: ${test.expectedAccount}<br />`;
                const applyingRule = rules.find(rule => rule.test(test))

                if (!applyingRule) {
                    return `${testDescription} ❌ Test fehlgeschlagen</div>`;
                }

                const matchedHtml = `- Account: ${applyingRule.account}, Zeile der angewandten Regel: ${applyingRule.number}`;
                if (test.expectedAccount === applyingRule.account) {
                    return `${testDescription} ✅ Test erfolgreich ${matchedHtml}</div>`;
                } else {
                    return `${testDescription} ❌ Test fehlgeschlagen ${matchedHtml}</div>`;
                }
            }

            window.addEventListener('load', () => run());
        </script>

        <style>
            .rules {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
            }

            .content {
                padding: 20px;
            }

            .tests {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .test-result {
                margin-left: -20px;
                padding: 5px 20px;
            }
            .test-result:nth-child(odd) {
                background: #F0F0F0;
            }
            .test-result:hover {
                background: #d9eaff;
            }
        </style>
    </head>
    <body>
        <div class="rules">
            <div class="content">
                <h2>Eingabe</h2>
                <textarea id="input" style="width: 500px;height: 200px;">
Österreich -> 10
68*, Paket -> 11
68*, Brief, -> 12
*, Brief -> 14
hello
* -> 13
                </textarea>
                <button onclick="run()">Testen</button>
            </div>
            <div class="content">
                <h2>Regeln</h2>
                <div id="output"></div>
            </div>
            <div class="content">
                <h2>Regeln - leserlich</h2>
                <div id="output-human-friendly"></div>
            </div>
        </div>
        <div class="content tests">
            <div>
                <h2>Tests</h2>
                <div id="tests"></div>
            </div>
            <div>

            </div>
        </div>
    </body>
</html>
